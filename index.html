<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Elite Portal | Ultra-Pro Systems</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div id="authOverlay" class="auth-overlay active">
        <div class="auth-card-container">
            <div class="glass-card auth-card">
                <div class="auth-header">
                    <div class="logo-box">
                        <img src="ersit.jpg" alt="Logo" class="custom-logo">
                    </div>
                    <h2 id="authTitle">System Access</h2>
                    <p id="authSubtitle">Identify yourself to enter the secure perimeter.</p>
                </div>
                
                <div class="auth-body">
                    <div class="input-group">
                        <label><i class="fa-solid fa-id-badge"></i> Username</label>
                        <input type="text" id="authUser" placeholder="Operator Identity" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label><i class="fa-solid fa-key"></i> Access Key</label>
                        <input type="password" id="authPass" placeholder="••••••••">
                    </div>
                    <button class="btn-glow w-100" id="authSubmit" onclick="handleAuth()">
                        <span>Authorize Access</span>
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>

                <div class="auth-footer">
                    <p class="auth-toggle">Protocol status: <span onclick="toggleAuthMode()" id="toggleText">Request Entry</span></p>
                </div>
            </div>
            <div class="auth-decoration-fast"></div>
            <div class="auth-decoration-slow"></div>
        </div>
    </div>

    <div class="wrapper" id="mainApp" style="display: none;">
        <header class="glass-header">
            <div class="brand">
                <div class="logo-box">
                    <img src="ersit.jpg" alt="Portal Logo" class="custom-logo">
                </div>
                <span>CRUDS <b>SYSTEM</b></span>
            </div>
            <div class="header-info">
                <div id="registryCount" class="count-badge">0 RECORDS</div>
                <div id="clock" class="digital-clock">00:00:00</div>
                <button class="action-btn logout-btn" title="Terminate Session" onclick="logout()">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </header>

        <section class="glass-card main-form">
            <div class="form-row">
                <div class="input-group">
                    <label><i class="fa-solid fa-user-shield"></i> Full Name</label>
                    <input type="text" id="studentName" placeholder="Enter Full Name" autocomplete="off" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
                </div>
                <div class="input-group">
                    <label><i class="fa-solid fa-id-card"></i> Registry ID</label>
                    <input type="text" id="studentID" placeholder="Enter Registry ID" autocomplete="off" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div class="input-group">
                    <label><i class="fa-solid fa-envelope-open-text"></i> Email Address</label>
                    <input type="email" id="studentEmail" placeholder="user@gmail.com" autocomplete="off">
                </div>
                <button class="btn-glow" id="actionBtn" onclick="triggerConfirm('save')">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>Save Entry</span>
                </button>
            </div>
        </section>

        <div class="search-container">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Search secure registry...">
            </div>
        </div>

        <div class="table-wrapper">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Identity</th>
                            <th>Reference</th>
                            <th>Communication</th>
                            <th style="text-align: right;">Commands</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content glass-card">
            <h2 id="modalTitle">Confirm Action</h2>
            <p id="modalDesc">Are you sure you want to proceed?</p>
            <div class="modal-actions" style="margin-top: 25px; display: flex; gap: 10px; justify-content: center;">
                <button class="action-btn" onclick="closeModal()">Cancel</button>
                <button id="modalConfirmBtn" class="btn-glow">Authorize</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
